<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> Caixa livre </title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	
	<style>
	.topo{
		background: #ffc107;
		text-align: center;
		font-size: 43px;
		font-weight: blod;
		border: 2px solid #110c8a;
	}

	.painel{
		background :#ddd;
		padding: 20px;
		border 2px solid #110c8a
	}
	.total{
		font-size: 28px;
		font-weigth: blod;
		font-align: right;
	}

	</style>
</head>

<body class="bg-primary bg-gradient">

	<div class="container mt-3">
		<div class="topo"> CAIXA LIVRE </div>

		<div class="row mt-2">

			<div class="col-md-7">
				<h3 class="text-white"> <span class="badge text-bg-primary"> Sua Compra </span> </h3>
				<ul id="lista" class="list-group lista"> </ul>
			</div>

			<div class="col-md-5">
				<div class="painel total"> Total: R$ <span id="total">0.00</span> </div>
				
				<div class="painel">
					<label >Código de Barras </label> <br>
					<input type="text id="cod" class="form-control>
				</div>
				<div class="painel">
					<label> Qantidade </label> <br>
					<input type="number" id="qtd" class="form-control" value"1"
				</div>
				
				<button class="btn btn-success w-100" onclick="addProduto()">
			</div>	
		</div>
	</div>	

</body>

</html>
